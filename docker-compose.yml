# Dev-стек одной командой: make dev (docker compose up --build).
# Креды ниже — только для локальной разработки; прод-значения приходят из окружения.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backend
      POSTGRES_PASSWORD: backend
      POSTGRES_DB: backend_core
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backend -d backend_core"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://backend:backend@db:5432/backend_core
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: .env
        required: false
    command: sh -c "python -m migrations.cli upgrade heads && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://backend:backend@db:5432/backend_core
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: .env
        required: false
    command: arq app.worker.WorkerSettings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
