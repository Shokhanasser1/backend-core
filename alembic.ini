# Конфигурация Alembic. Запуск — только через обёртку `python -m migrations.cli`
# (или `make migrate`): она динамически собирает version_locations из папок
# компонентов (shared/migrations, core/*/migrations, modules/*/*/migrations).
# Причина: Alembic читает version_locations ДО выполнения env.py, а статический
# список в ini создавал бы конфликты merge в клиентских проектах (ADR-0008).

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s
# sqlalchemy.url не задаётся здесь: URL берётся из окружения (env.py)
